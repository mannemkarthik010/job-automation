name: Morning Job Application Run

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create logs directory
        run: mkdir -p logs

      - name: Check secrets are present
        run: |
          echo "ANTHROPIC_API_KEY present: ${{ secrets.ANTHROPIC_API_KEY != '' }}"
          echo "GOOGLE_SHEETS_CREDS present: ${{ secrets.GOOGLE_SHEETS_CREDS != '' }}"
          echo "SPREADSHEET_ID present: ${{ secrets.SPREADSHEET_ID != '' }}"

      - name: Run morning job application workflow
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDS:          ${{ secrets.GOOGLE_SHEETS_CREDS }}
          SPREADSHEET_ID:               ${{ secrets.SPREADSHEET_ID }}
          APPLICANT_NAME:               ${{ secrets.APPLICANT_NAME }}
          APPLICANT_DEGREE:             ${{ secrets.APPLICANT_DEGREE }}
          APPLICANT_UNIVERSITY:         ${{ secrets.APPLICANT_UNIVERSITY }}
          APPLICANT_GRADUATION:         ${{ secrets.APPLICANT_GRADUATION }}
          APPLICANT_GPA:                ${{ secrets.APPLICANT_GPA }}
          APPLICANT_WORK_AUTH:          ${{ secrets.APPLICANT_WORK_AUTH }}
          APPLICANT_NEEDS_SPONSORSHIP:  ${{ secrets.APPLICANT_NEEDS_SPONSORSHIP }}
        run: python main.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
